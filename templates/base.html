<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AI Research Assistant{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark" id="mainNav">
        <div class="container-xl">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <i class="bi bi-robot fs-4"></i>
                <span class="fw-bold">ResearchAgent</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}" href="/"><i
                                class="bi bi-house me-1"></i>Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.blueprint == 'search' %}active{% endif %}" href="/search/"><i
                                class="bi bi-search me-1"></i>Search</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.blueprint == 'citation' %}active{% endif %}"
                            href="/citation/"><i class="bi bi-quote me-1"></i>Citations</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.blueprint == 'plagiarism' %}active{% endif %}"
                            href="/plagiarism/"><i class="bi bi-shield-check me-1"></i>Plagiarism</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.blueprint == 'reference' %}active{% endif %}"
                            href="/reference/"><i class="bi bi-bookmark me-1"></i>References</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.blueprint == 'related' %}active{% endif %}" href="/related/">
                            <i class="bi bi-diagram-3 me-1"></i>Related Work
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'main.dashboard' %}active{% endif %}"
                            href="/dashboard"><i class="bi bi-bar-chart me-1"></i>Dashboard</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer mt-5 py-4">
        <div class="container text-center">
            <p class="mb-1 text-muted small">
                <i class="bi bi-robot me-1"></i>
                AI Research Assistant Agent &mdash; SEN-330 Agent Based Computing
            </p>
            <p class="text-muted small mb-0">Powered by arXiv API &bull; Semantic Scholar &bull; Flask &bull; SQLite</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
